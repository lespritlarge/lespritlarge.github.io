<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogue — L'Esprit Large</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:#f2f0ef;--warm-white:#f7f5f4;--wood:#8b2e2e;--wood-dark:#5c1a1a;
      --wood-light:#b86060;--amber:#9e3a3a;--ink:#1e1e1e;--ink-soft:#3a3a3a;
      --moss:#4a6e4a;--parchment:#ebe8e8;--shadow:rgba(30,10,10,0.13);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'Lora',serif;background:var(--warm-white);color:var(--ink);}

    nav{position:sticky;top:0;z-index:100;background:rgba(242,240,239,0.97);
      backdrop-filter:blur(8px);border-bottom:1px solid rgba(92,26,26,0.12);
      padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:80px;}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:800;
      font-style:italic;color:var(--wood-dark);letter-spacing:-0.02em;
      text-decoration:none;display:flex;align-items:center;gap:0.75rem;}
    .nav-logo img{height:44px;width:auto;}
    .nav-links{display:flex;gap:1.4rem;list-style:none;}
    .nav-links a{font-family:'Raleway',sans-serif;font-size:0.75rem;font-weight:500;
      letter-spacing:0.07em;text-transform:uppercase;text-decoration:none;
      color:var(--ink-soft);white-space:nowrap;transition:color 0.2s;}
    .nav-links a:hover,.nav-links a.active{color:var(--wood);}

    .page-header{background:var(--wood-dark);color:var(--cream);padding:3rem 4rem 2.5rem;}
    .page-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);
      font-weight:800;font-style:italic;margin-bottom:0.4rem;}
    .page-header p{font-family:'Lora',serif;font-style:italic;font-size:1rem;opacity:0.7;}

    .toolbar{background:var(--cream);border-bottom:1px solid var(--parchment);
      padding:1.2rem 4rem;display:flex;align-items:center;gap:1rem;
      flex-wrap:wrap;position:sticky;top:80px;z-index:50;}
    .search-wrap{display:flex;align-items:center;background:white;
      border:1.5px solid var(--parchment);border-radius:3px;padding:0 1rem;
      flex:1;max-width:360px;transition:border-color 0.2s;}
    .search-wrap:focus-within{border-color:var(--wood);}
    .search-wrap input{border:none;outline:none;background:transparent;
      font-family:'Lora',serif;font-size:0.9rem;color:var(--ink);padding:0.65rem 0;width:100%;}
    .search-wrap span{color:var(--ink-soft);}
    .filters{display:flex;gap:0.5rem;flex-wrap:wrap;}
    .tag{font-family:'Raleway',sans-serif;font-size:0.7rem;font-weight:600;
      letter-spacing:0.05em;text-transform:uppercase;padding:0.3rem 0.85rem;
      border-radius:20px;cursor:pointer;border:1px solid var(--wood-light);
      color:var(--ink-soft);background:transparent;transition:all 0.2s;}
    .tag.active,.tag:hover{background:var(--wood);color:var(--cream);border-color:var(--wood);}
    .results-count{font-family:'Raleway',sans-serif;font-size:0.75rem;
      color:var(--ink-soft);margin-left:auto;white-space:nowrap;}

    .catalogue-body{padding:2.5rem 4rem;}
    .book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:1.8rem;}
    .book-card{background:var(--cream);border-radius:4px;overflow:hidden;
      box-shadow:0 2px 12px var(--shadow);transition:transform 0.25s,box-shadow 0.25s;
      animation:fadeUp 0.4s ease both;}
    .book-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(42,31,20,0.18);}
    .book-cover{width:100%;aspect-ratio:2/3;display:flex;align-items:center;
      justify-content:center;background:#e8e4e0;position:relative;overflow:hidden;}
    .book-cover img{width:100%;height:100%;object-fit:cover;}
    .book-badge{position:absolute;top:0.5rem;right:0.5rem;font-family:'Raleway',sans-serif;
      font-size:0.6rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;
      padding:0.15rem 0.45rem;border-radius:2px;}
    .badge-fav{background:var(--amber);color:white;}
    .badge-out{background:#999;color:white;}
    .book-info{padding:0.9rem;}
    .book-title{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:600;
      color:var(--ink);margin-bottom:0.2rem;line-height:1.3;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .book-author{font-family:'Lora',serif;font-style:italic;font-size:0.75rem;
      color:var(--ink-soft);margin-bottom:0.5rem;
      display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
    .book-genre{font-family:'Raleway',sans-serif;font-size:0.62rem;letter-spacing:.06em;
      text-transform:uppercase;background:var(--parchment);color:var(--ink-soft);
      padding:.12rem .45rem;border-radius:2px;display:inline-block;}
    .book-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.7rem;}
    .book-price{font-family:'Raleway',sans-serif;font-weight:700;font-size:0.95rem;color:var(--wood);}
    .stock-ok{font-family:'Raleway',sans-serif;font-size:0.65rem;font-weight:600;color:var(--moss);}
    .stock-out{font-family:'Raleway',sans-serif;font-size:0.65rem;font-weight:600;color:#aaa;}
    .btn-reserve{width:100%;margin-top:0.7rem;font-family:'Raleway',sans-serif;
      font-size:0.72rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;
      padding:0.5rem;border:none;cursor:pointer;border-radius:2px;transition:all 0.2s;}
    .btn-reserve.available{background:var(--wood);color:var(--cream);}
    .btn-reserve.available:hover{background:var(--wood-dark);}
    .btn-reserve.unavailable{background:#ddd;color:#999;cursor:not-allowed;}

    .pagination{display:flex;justify-content:center;align-items:center;
      gap:0.5rem;padding:3rem 0 4rem;}
    .page-btn{font-family:'Raleway',sans-serif;font-size:0.78rem;font-weight:600;
      padding:0.5rem 0.9rem;border:1.5px solid var(--parchment);background:white;
      color:var(--ink-soft);cursor:pointer;border-radius:3px;transition:all 0.2s;
      min-width:2.4rem;text-align:center;}
    .page-btn:hover,.page-btn.active{background:var(--wood);color:white;border-color:var(--wood);}
    .page-btn:disabled{opacity:0.3;cursor:not-allowed;}

    .empty,.loading{grid-column:1/-1;text-align:center;font-family:'Lora',serif;
      font-style:italic;color:var(--ink-soft);padding:4rem 0;}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,10,10,0.5);
      z-index:999;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--cream);border-radius:4px;padding:2.5rem;
      max-width:480px;width:90%;box-shadow:0 20px 60px rgba(30,10,10,0.35);}
    .modal h3{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:1rem;}
    .modal input,.modal textarea{width:100%;padding:0.65rem 0.9rem;margin-bottom:0.9rem;
      border:1.5px solid var(--parchment);border-radius:3px;font-family:'Lora',serif;
      font-size:0.9rem;background:white;outline:none;transition:border-color 0.2s;}
    .modal input:focus,.modal textarea:focus{border-color:var(--wood);}
    .modal-btns{display:flex;gap:0.8rem;justify-content:flex-end;margin-top:0.5rem;}
    .btn-cancel{font-family:'Raleway',sans-serif;font-size:0.78rem;font-weight:600;
      padding:0.6rem 1.4rem;background:transparent;border:1.5px solid var(--parchment);
      color:var(--ink-soft);cursor:pointer;border-radius:2px;}
    .btn-send{font-family:'Raleway',sans-serif;font-size:0.78rem;font-weight:600;
      padding:0.6rem 1.4rem;background:var(--wood);color:white;border:none;
      cursor:pointer;border-radius:2px;transition:background 0.2s;}
    .btn-send:hover{background:var(--wood-dark);}

    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(2rem);
      background:var(--wood-dark);color:var(--cream);font-family:'Raleway',sans-serif;
      font-size:0.85rem;padding:0.9rem 2rem;border-radius:4px;
      box-shadow:0 4px 20px rgba(30,10,10,0.3);opacity:0;transition:all 0.35s;
      pointer-events:none;z-index:9999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

    @media(max-width:768px){
      .page-header,.toolbar,.catalogue-body{padding-left:1.5rem;padding-right:1.5rem;}
      .toolbar{top:0;}
      .book-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;}
      nav{padding:0 1rem;}
      .nav-links{display:none;}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/logo.png" alt="L'Esprit Large" onerror="this.style.display='none'"/>
    L'Esprit Large
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="catalogue.html" class="active">Catalogue</a></li>
    <li><a href="evenements.html">Événements</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="escapades.html" style="color:#c8a96e;font-weight:600;">🎒 Escapades</a></li>
    <li><a href="avisdetempete.html">🌊 Avis de Tempête</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>Notre catalogue</h1>
  <p id="headerSub">Chargement en cours…</p>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span>🔍&nbsp;</span>
    <input type="text" id="searchInput" placeholder="Titre, auteur, éditeur…" oninput="filterBooks()" />
  </div>
  <div class="filters" id="filterBtns">
    <button class="tag active" onclick="setFilter('Tous',this)">Tous</button>
  </div>
  <span class="results-count" id="resultsCount"></span>
</div>

<div class="catalogue-body">
  <div class="book-grid" id="bookGrid">
    <p class="loading">⏳ Chargement du catalogue…</p>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- MODAL RÉSERVATION -->
<div class="modal-overlay" id="reserveModal">
  <div class="modal">
    <h3>Réserver un exemplaire</h3>
    <p style="font-family:'Lora',serif;font-style:italic;font-size:.9rem;color:var(--ink-soft);margin-bottom:1.2rem;" id="reserveBookTitle"></p>
    <input type="text" id="rNom" placeholder="Votre nom" />
    <input type="tel" id="rTel" placeholder="Votre téléphone" />
    <input type="email" id="rEmail" placeholder="Votre e-mail" />
    <textarea id="rMsg" placeholder="Message (facultatif)" rows="2" style="resize:vertical;"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeReserve()">Annuler</button>
      <button class="btn-send" onclick="sendReserve()">Envoyer la réservation</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let BOOKS = [];
let filtered = [];
let currentFilter = 'Tous';
let currentPage = 1;
const PER_PAGE = 40;
let reserveBook = null;

async function chargerStock() {
  try {
    const r = await fetch('stock.json?t=' + Date.now());
    if (!r.ok) throw new Error();
    const data = await r.json();
    BOOKS = (data.livres || []).map((b, i) => ({
      id: i + 1,
      ean: b.ean,
      title: b.titre || '',
      author: b.auteur || '',
      editeur: b.editeur || '',
      genre: devinerGenre(b.titre, b.auteur, b.editeur),
      price: (b.prix || '').replace(' EUR','€').replace(' €','€').trim(),
      stock: b.quantite || 0,
      couverture: b.couverture || '',
      fav: false,
    }));

    // Coups de cœur
    try {
      const rc = await fetch('coups.json?t=' + Date.now());
      if (rc.ok) {
        const dc = await rc.json();
        const eans = (dc.coups || []).map(c => c.ean);
        BOOKS.forEach(b => { b.fav = eans.includes(b.ean); });
      }
    } catch(e) {}

    buildFilters();
    document.getElementById('headerSub').textContent =
      BOOKS.length + ' titres disponibles en librairie ou à la commande';
    filterBooks();
  } catch(e) {
    document.getElementById('bookGrid').innerHTML =
      '<p class="loading">Le catalogue sera bientôt disponible.</p>';
  }
}

function buildFilters() {
  const counts = {};
  BOOKS.forEach(b => { counts[b.genre] = (counts[b.genre]||0) + 1; });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(e => e[0]);
  const wrap = document.getElementById('filterBtns');
  wrap.innerHTML = '<button class="tag active" onclick="setFilter(\'Tous\',this)">Tous</button>';
  sorted.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'tag';
    btn.textContent = g;
    btn.onclick = function() { setFilter(g, this); };
    wrap.appendChild(btn);
  });
}

function devinerGenre(titre, auteur, editeur) {
  const t = ((titre||'') + ' ' + (editeur||'')).toLowerCase();
  if (t.includes('manga')||t.includes('shonen')||t.includes('seinen')) return 'Manga';
  if (t.includes('bande dessin')||t.includes('comics')||t.includes('dupuis')||t.includes('dargaud')||t.includes('casterman')) return 'Bande dessinée';
  if (t.includes('jeunesse')||t.includes('école des loisirs')||t.includes('bayard')||t.includes('gallimard jeun')) return 'Jeunesse';
  if (t.includes('policier')||t.includes('thriller')||t.includes('crime')||t.includes('noir')) return 'Policier';
  if (t.includes('science-fiction')||t.includes(' sf ')||t.includes('fantasy')||t.includes('fantastique')) return 'SF / Fantasy';
  if (t.includes('poésie')||t.includes('poeme')||t.includes('poème')) return 'Poésie';
  if (t.includes('document')||t.includes('essai')||t.includes('biograph')) return 'Essai / Document';
  return 'Littérature';
}

function setFilter(genre, el) {
  currentFilter = genre;
  currentPage = 1;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filterBooks();
}

function filterBooks() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filtered = BOOKS;
  if (currentFilter !== 'Tous') filtered = filtered.filter(b => b.genre === currentFilter);
  if (q) filtered = filtered.filter(b =>
    b.title.toLowerCase().includes(q) ||
    b.author.toLowerCase().includes(q) ||
    b.editeur.toLowerCase().includes(q)
  );
  currentPage = 1;
  renderPage();
}

function renderPage() {
  const grid = document.getElementById('bookGrid');
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  const start = (currentPage - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  document.getElementById('resultsCount').textContent =
    total === BOOKS.length ? total + ' livres' : total + ' résultat' + (total>1?'s':'');

  if (!slice.length) {
    grid.innerHTML = '<p class="empty">Aucun livre trouvé pour cette recherche.</p>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = slice.map((b, i) => {
    const sClass = b.stock > 0 ? 'stock-ok' : 'stock-out';
    const sLabel = b.stock > 0 ? '● En stock' : '● À la commande';
    const badge = b.fav ? '<span class="book-badge badge-fav">❤ Coup de cœur</span>'
                : b.stock === 0 ? '<span class="book-badge badge-out">Commande</span>' : '';
    const btnClass = b.stock > 0 ? 'available' : 'unavailable';
    const btnLabel = b.stock > 0 ? 'Réserver' : 'Me prévenir';
    const imgHtml = b.couverture
      ? '<img src="' + b.couverture + '" alt="' + b.title.replace(/"/g,'') + '" loading="lazy"' +
        ' onerror="this.style.display=\'none\';this.nextElementSibling.style.cssText=\'display:flex;font-size:2.5rem;align-items:center;justify-content:center;width:100%;height:100%;\'">' +
        '<span style="display:none">📖</span>'
      : '<span style="font-size:2.5rem;">📖</span>';
    return '<div class="book-card" style="animation-delay:' + (i%PER_PAGE*0.025) + 's">' +
      '<div class="book-cover">' + badge + imgHtml + '</div>' +
      '<div class="book-info">' +
        '<div class="book-title">' + b.title + '</div>' +
        '<div class="book-author">' + b.author + '</div>' +
        '<span class="book-genre">' + b.genre + '</span>' +
        '<div class="book-footer">' +
          '<span class="book-price">' + b.price + '</span>' +
          '<span class="' + sClass + '">' + sLabel + '</span>' +
        '</div>' +
        '<button class="btn-reserve ' + btnClass + '" onclick="openReserve(' + b.id + ')">' + btnLabel + '</button>' +
      '</div></div>';
  }).join('');

  renderPagination(pages);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination(pages) {
  const wrap = document.getElementById('pagination');
  if (pages <= 1) { wrap.innerHTML = ''; return; }
  let html = '<button class="page-btn" onclick="goPage(' + (currentPage-1) + ')"' + (currentPage===1?' disabled':'') + '>‹</button>';
  for (let p = 1; p <= pages; p++) {
    if (p === 1 || p === pages || Math.abs(p - currentPage) <= 2) {
      html += '<button class="page-btn' + (p===currentPage?' active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
    } else if (Math.abs(p - currentPage) === 3) {
      html += '<span style="padding:0 .3rem;color:var(--ink-soft);">…</span>';
    }
  }
  html += '<button class="page-btn" onclick="goPage(' + (currentPage+1) + ')"' + (currentPage===pages?' disabled':'') + '>›</button>';
  wrap.innerHTML = html;
}

function goPage(p) { currentPage = p; renderPage(); }

function openReserve(id) {
  reserveBook = BOOKS.find(b => b.id === id);
  if (!reserveBook) return;
  document.getElementById('reserveBookTitle').textContent = '« ' + reserveBook.title + ' » — ' + reserveBook.author;
  document.getElementById('reserveModal').classList.add('open');
}
function closeReserve() {
  document.getElementById('reserveModal').classList.remove('open');
  ['rNom','rTel','rEmail','rMsg'].forEach(id => { document.getElementById(id).value = ''; });
}
document.getElementById('reserveModal').addEventListener('click', function(e) {
  if (e.target === this) closeReserve();
});
function sendReserve() {
  const nom   = document.getElementById('rNom').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const tel   = document.getElementById('rTel').value.trim();
  const msg   = document.getElementById('rMsg').value.trim();
  if (!nom || !email) { showToast('⚠️ Veuillez renseigner votre nom et e-mail.'); return; }
  const titre = reserveBook ? reserveBook.title : '?';
  fetch('https://formspree.io/f/mvzwkqzn', {
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body: JSON.stringify({ _subject:'Réservation : ' + titre, nom, tel, email, livre: titre, message: msg })
  }).then(r=>r.json()).then(d => {
    if (d.ok) { closeReserve(); showToast('✅ Réservation envoyée pour « ' + titre + ' » !'); }
    else showToast('⚠️ Une erreur est survenue, réessayez.');
  }).catch(() => showToast('⚠️ Une erreur est survenue, réessayez.'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

chargerStock().then(() => {
  // Pré-remplir la recherche depuis l'URL (?q=...)
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('searchInput').value = q;
    filterBooks();
  }
});
</script>
</body>
</html>
